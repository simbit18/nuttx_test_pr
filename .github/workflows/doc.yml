---
name: "Manually Build Documentation"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:

      repo-nuttx:
        description: What's the name of the repository nuttx (e.g. userGH/nuttx)?
        required: true
        type: string

      branch-nuttx:
        description: What's the name of the nuttx branch (e.g. fix-nuttx)?
        required: true
        type: string

      repo-apps:
        description: What's the name of the repository nuttx-apps (e.g. userGH/nuttx-apps)?
        required: true
        type: string

      branch-apps:
        description: What's the name nuttx-apps branch (e.g. fix-apps)?
        required: true
        type: string

concurrency:
  group: build-man-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Fetch-Source:
    runs-on: ubuntu-latest
    steps:
      - name: View input parameters
        shell: bash
        run: |
          echo "Nuttx repository: ${{ inputs.repo-nuttx }}"
          echo "    Nuttx branch: ${{ inputs.branch-nuttx }}"
          echo " Apps repository: ${{ inputs.repo-apps }}"
          echo "     Apps branch: ${{ inputs.branch-apps }}"
          echo "          Config: ${{ inputs.board-config }}"
          echo "    Build system: ${{ inputs.build-system }}"

      - name: Determine Target Branches
        id: gittargets
        shell: bash
        run: |
          OS_REF=""
          APPS_REF=""
          REF="refs/heads/master"
          echo "Working with ref: $REF"

      - name: Checkout nuttx repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.repo-nuttx }}
          ref: ${{ inputs.branch-nuttx }}
          path: sources/nuttx
          fetch-depth: 1

      - name: Checkout apps repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.repo-apps }}
          ref: ${{ inputs.branch-apps }}
          path: sources/apps
          fetch-depth: 1

      - name: Tar sources
        run: tar zcf sources.tar.gz sources

      - name: Archive Source Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: source-bundle
          path: sources.tar.gz

  build-html:
    needs: Fetch-Source
    runs-on: ubuntu-latest
    steps:
      - name: Download Source Artifact
        uses: actions/download-artifact@v8
        with:
          name: source-bundle
          path: .

      - name: Extract sources
        run: tar zxf sources.tar.gz

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Generate Documentation
        run: |
          export ARTIFACTDIR=`pwd`/buildartifacts
          echo "ARTIFACTDIR: $ARTIFACTDIR"
          cd sources/nuttx/Documentation/
          sudo apt update
          sudo apt install plantuml
          pip3 install pipenv
          pipenv install
          pipenv run make html
          $artifactconfigdir=$ARTIFACTDIR/$(echo "_build" | sed "s/:/\//")/
          echo "artifactconfigdir: $artifactconfigdir"
          mkdir -p $artifactconfigdir
          cp -r _build/ $artifactconfigdir/
          ls $artifactconfigdir/

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sphinx-docs
          path: |
            buildartifacts/html/
            buildartifacts/latex/*.pdf
